name: ci
on: [push, pull_request]
permissions: read-all
env:
  CI: gha
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: postgres
  POSTGRES_HOST: localhost
  RAILS_ENV: test

jobs:
  setup:
    name: Setup Matrix
    runs-on: ubuntu-latest
    outputs:
      ruby-versions: ${{ steps.set-matrix.outputs.ruby-versions }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: echo "ruby-versions=[\"3.4\"]" >> $GITHUB_OUTPUT

  test:
    name: Test-RUBY${{ matrix.ruby-versions }}
    runs-on: ubuntu-24.04
    needs: setup
    strategy:
      matrix:
        ruby-versions: ${{ fromJSON(needs.setup.outputs.ruby-versions) }}
        psql-version: [ '18' ]
        node-version: [ '22' ]
        redis-version: [ '8' ]
    services:
      postgres:
        image: postgres:${{ matrix.psql-version }}
        env:
          POSTGRES_HOST: ${{ env.POSTGRES_HOST }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:${{ matrix.redis-version }}
        ports: ['6379:6379']
        options: --entrypoint redis-server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-versions }}

      - name: Cache Gems
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Cache Yarn
        uses: actions/cache@v5
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-

      - name: Install PSQL client
        run: |
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /usr/share/keyrings/postgresql-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-archive-keyring.gpg] http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-${{ matrix.psql-version }}

      - name: Install needed packages
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libsodium-dev libpq-dev

      - name: Build app
        id: app-build
        run: ruby bin/setup

      - name: Test app
        id: app-test
        run: rails test

      - name: Upload coverage artifact
        id: upload-coverage-artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.ruby-versions }}-coverage-report
          include-hidden-files: true
          path: ${{ github.workspace }}/coverage
          overwrite: true

  coverage:
    name: Coverage-RUBY${{ matrix.ruby-versions }}
    runs-on: ubuntu-latest
    needs: [setup, test]
    if: success()
    continue-on-error: false
    strategy:
      matrix:
        ruby-versions: ${{ fromJSON(needs.setup.outputs.ruby-versions) }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.ruby-versions }}-coverage-report
          path: coverage

      - name: Check minimum coverage
        uses: unil-lettres/simplecov-check@main
        with:
          minimum_coverage: ${{ vars.MINIMUM_COVERAGE || 65 }}
          coverage_path: coverage/.last_run.json
